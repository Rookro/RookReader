name: Full Validation Suite

on:
  schedule:
    # Execute every Sunday at 18:00 UTC (= Monday at 03:00 AM JST)
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to run tests on"
        required: true
        default: "develop"
        type: string

jobs:
  full-tests:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-latest"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Checkout merged branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_branch || 'develop' }}

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "cache-for-build-app-actions"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run biome check
        run: npm run check

      - name: Generate third-party licenses
        run: npm run licenses

      - name: Run cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: npm run test

      - name: Run e2e tests on ubuntu
        if: matrix.platform == 'ubuntu-latest'
        run: npm run test:e2e

      - name: Run e2e tests on windows
        if: matrix.platform == 'windows-latest'
        run: npm run test:e2e:win
