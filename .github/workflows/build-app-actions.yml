name: Build application

on:
  workflow_dispatch:
  pull_request:

jobs:
  build-application:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-latest"
          - platform: "windows-latest"

    runs-on: ${{ matrix.platform }}
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Checkout merged branch
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: "cache-for-build-app-actions"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Generate third-party licenses
        run: npm run licenses

      - name: Run cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: npm run test

      - name: Run e2e tests (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: npm run test:e2e

      - name: Build and upload artifacts.
        uses: tauri-apps/tauri-action@dev # use dev to upload artifacts.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          uploadWorkflowArtifacts: true
